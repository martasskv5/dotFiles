# ~/.config/hypr/hyprlock.conf

# 1. THE PIXIE WALLPAPER
background {
    monitor =
    path = ~/Pictures/wallpapers/anime-girl-with-sword-glasses-4k-wallpaper-uhdpaper.com-697@2@b.jpg  # Replace with your path
    blur_passes = 1
    blur_size = 0
    contrast = 0.8
    brightness = 0.7
}

# 2. STACKED PIXEL CLOCK: HOURS (Top)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = rgb(252, 104, 6) # Pixie Signature Pastel Green
    font_size = 140
    font_family = Google Sans Flex Freeze Regular
    position = 0, 240
    halign = center
    valign = center
    shadow_color = rgba(0, 0, 0, 0.5)
    shadow_offset = -5, 5
    shadow_size = 2
    shadow_passes = 4
}

# 3. STACKED PIXEL CLOCK: MINUTES (Bottom)
label {# Position: Top Left corner of the screen, slightly offset for aesthetics
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = rgb(234, 178, 138) # Matches the hour color accent
    font_size = 140
    font_family = Google Sans Flex Freeze Regular
    position = 0, 80
    halign = center
    valign = center
    shadow_color = rgba(0, 0, 0, 0.5)
    shadow_offset = -5, 5
    shadow_size = 2
    shadow_passes = 4
}

# 4. CURRENT DATE DISPLAY
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(255, 255, 255, 0.75)
    font_size = 16
    font_family = Google Sans Flex Freeze Regular
    position = 0, -20
    halign = center
    valign = center
}

# Degrees
label {
    monitor =
    text = cmd[update:18000000] echo "Feels like $(curl -s 'wttr.in?format=%t' | tr -d '+')"
    color = rgba(255, 255, 255, 0.75)
    font_size = 16
    font_family = Google Sans Flex Freeze Regular

    position = 0, -50
    halign = center
    valign = center
}

# Music Info Widget
label {
    monitor =
    # Runs playerctl; replaces text with "Stopped" if nothing is playing
    text = cmd[update:1000] echo "<span foreground='##e7e1c2'>Now playing: <big>$(playerctl --player=spotify,%any metadata --format '   \{{title}}  •  \{{artist}}' 2>/dev/null || echo '   No Media Playing')</big></span>"
    color = rgba(255, 255, 255, 0.8)
    font_size = 14
    font_family = Google Sans Flex Freeze Regular # Requires a Nerd Font for icons

    position = 0, 40
    halign = center
    valign = bottom
}

