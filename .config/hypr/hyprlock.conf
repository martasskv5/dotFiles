# 5. MATERIAL DESIGN 3 / PIXEL CAPSULE INPUT FIELD
input-field {
    monitor =
    size = 280, 60
    outline_thickness = 0 # Clean edge, borderless styling
    dots_size = 0.25 
    dots_spacing = 0.35 
    dots_center = true
    
    # Material You translucent UI Colors
    inner_color = rgba(40, 38, 30, 0.65)  # Darker, muted organic green-tint
    font_color = rgb(245, 242, 230)
    
    # Matching the extreme rounded corners of Pixel UI
    rounding = 30 
    
    fade_on_empty = true
    # placeholder_text = <span foreground="##e7e1c2">Unlock</span>
    hide_input = false
    
    position = 0, -300
    halign = center
    valign = center
}
